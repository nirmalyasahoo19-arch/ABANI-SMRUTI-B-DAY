<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Smruti 🎂</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="stars"></div>

  <!-- Balloons -->
  <img class="balloon" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" style="left:10%; animation-duration:12s;">
  <img class="balloon" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" style="left:30%; animation-duration:9s;">
  <img class="balloon" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" style="left:50%; animation-duration:11s;">
  <img class="balloon" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" style="left:70%; animation-duration:8s;">
  <img class="balloon" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" style="left:90%; animation-duration:10s;">

  <div class="container">
    <div class="birthday-text">
      HAPPY BIRTHDAY
    </div>

    <div class="name">
      SMRUTI 🎉
    </div>

    <div class="message">
      May your day shine brighter than the stars ✨  
      and your smile stay forever beautiful 💖  
      Wishing you unlimited happiness, success, love,  
      crazy memories and magical moments ahead 🎂🥂
    </div>

    <button class="btn" onclick="playWish()">
      🎵 Click For Surprise
    </button>
  </div>

  <div class="footer">
    Made with ❤️ specially for Smruti
  </div>

  <audio id="song">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
  </audio>

  <script src="script.js"></script>

</body>
</html>
