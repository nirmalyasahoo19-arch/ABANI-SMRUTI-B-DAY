<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Smruti 🎂</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      overflow:hidden;
      background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      text-align:center;
    }

    .stars{
      position:absolute;
      width:100%;
      height:100%;
      overflow:hidden;
      z-index:0;
    }

    .star{
      position:absolute;
      width:2px;
      height:2px;
      background:white;
      border-radius:50%;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle{
      from{opacity:0.2;}
      to{opacity:1;}
    }

    .container{
      position:relative;
      z-index:2;
      animation: fadeIn 2s ease;
    }

    .birthday-text{
      font-size:5rem;
      font-weight:800;
      background: linear-gradient(90deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      text-shadow:0 0 30px rgba(255,255,255,0.3);
      animation: glow 2s infinite alternate;
    }

    @keyframes glow{
      from{
        transform:scale(1);
      }
      to{
        transform:scale(1.05);
      }
    }

    .name{
      font-size:4rem;
      margin-top:10px;
      color:#ffd700;
      text-shadow:0 0 15px #ffd700;
      animation: bounce 2s infinite;
    }

    @keyframes bounce{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-10px);}
    }

    .message{
      margin-top:25px;
      font-size:1.3rem;
      width:80%;
      max-width:700px;
      margin-left:auto;
      margin-right:auto;
      line-height:1.8;
      color:#f1f1f1;
    }

    .btn{
      margin-top:35px;
      padding:15px 35px;
      border:none;
      border-radius:50px;
      background:linear-gradient(45deg,#ff4b2b,#ff416c);
      color:white;
      font-size:1.1rem;
      cursor:pointer;
      transition:0.4s;
      box-shadow:0 0 20px rgba(255,65,108,0.5);
    }

    .btn:hover{
      transform:scale(1.1);
      box-shadow:0 0 35px rgba(255,65,108,0.9);
    }

    .balloon{
      position:absolute;
      bottom:-150px;
      width:80px;
      animation: float 10s infinite ease-in;
      z-index:1;
    }

    @keyframes float{
      0%{
        transform:translateY(0) rotate(0deg);
      }
      100%{
        transform:translateY(-120vh) rotate(360deg);
      }
    }

    .confetti{
      position:absolute;
      width:10px;
      height:10px;
      background:red;
      top:-20px;
      animation: fall linear infinite;
    }

    @keyframes fall{
      to{
        transform:translateY(110vh) rotate(720deg);
      }
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .footer{
      position:absolute;
      bottom:20px;
      width:100%;
      text-align:center;
      color:#ddd;
      font-size:0.9rem;
      z-index:3;
    }
  </style>
</head>

<body>

  <div class="stars"></div>

  <!-- Balloons -->
  <img class="balloon" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" style="left:10%; animation-duration:12s;">
  <img class="balloon" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" style="left:30%; animation-duration:9s;">
  <img class="balloon" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" style="left:50%; animation-duration:11s;">
  <img class="balloon" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" style="left:70%; animation-duration:8s;">
  <img class="balloon" src="https://cdn-icons-png.flaticon.com/512/3468/3468377.png" style="left:90%; animation-duration:10s;">

  <div class="container">
    <div class="birthday-text">
      HAPPY BIRTHDAY
    </div>

    <div class="name">
      SMRUTI 🎉
    </div>

    <div class="message">
      May your day shine brighter than the stars ✨  
      and your smile stay forever beautiful 💖  
      Wishing you unlimited happiness, success, love,  
      crazy memories and magical moments ahead 🎂🥂
    </div>

    <button class="btn" onclick="playWish()">
      🎵 Click For Surprise
    </button>
  </div>

  <div class="footer">
    Made with ❤️ specially for Smruti
  </div>

  <audio id="song">
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
  </audio>

  <script>
    // Stars
    const starsContainer = document.querySelector('.stars');

    for(let i=0;i<150;i++){
      const star = document.createElement('div');
      star.classList.add('star');

      star.style.left = Math.random()*100 + '%';
      star.style.top = Math.random()*100 + '%';

      star.style.animationDuration = (Math.random()*3+1) + 's';

      starsContainer.appendChild(star);
    }

    // Confetti
    for(let i=0;i<120;i++){
      const confetti = document.createElement('div');
      confetti.classList.add('confetti');

      confetti.style.left = Math.random()*100 + 'vw';
      confetti.style.backgroundColor =
      `hsl(${Math.random()*360},100%,50%)`;

      confetti.style.animationDuration =
      (Math.random()*3+2) + 's';

      confetti.style.opacity = Math.random();

      document.body.appendChild(confetti);
    }

    function playWish(){
      document.getElementById("song").play();

      alert("🎂 Happiest Birthday Smruti 💖✨");
    }
  </script>

</body>
</html>
